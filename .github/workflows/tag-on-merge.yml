name: Auto version & release

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    # Skip if this commit was the auto-bump itself
    if: "!contains(github.event.head_commit.message, '[auto-release]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get current version and compute next
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          # Find the latest v* tag and bump patch
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="0.1.0"
          else
            # Strip leading v
            LATEST="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST_TAG -> v$NEXT"

      - name: Create tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
